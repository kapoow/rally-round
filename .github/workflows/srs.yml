name: SRS - Automated Update

on:
  schedule:
    # every hour on the hour
    - cron: "0 * * * *"

jobs:
  update-srs:
    runs-on: ubuntu-latest
    env:
      DIRT_USERNAME: ${{ secrets.DIRT_USERNAME }}
      DIRT_PASSWORD: ${{ secrets.DIRT_PASSWORD }}
      RACENET_USERNAME: ${{ secrets.RACENET_USERNAME }}
      RACENET_PASSWORD: ${{ secrets.RACENET_PASSWORD }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GITHUB_ACCESS_TOKEN: ${{ secrets.GH_PAGES_TOKEN }}
      GITHUB_ORG: ${{ secrets.GH_ORG }}
      KEEP_LOCAL_CACHE: true
      LOCALE: se
      DEBUG: tkidman:*

    steps:
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Restore event cache
        uses: actions/cache@v4
        with:
          path: hidden/cache
          key: srs-cache-${{ github.run_id }}
          restore-keys: |
            srs-cache-

      - name: Install dependencies
        run: npm ci

      - name: Generate championship results for SRS EAWRC
        run: CLUB=srs-eawrc node --unhandled-rejections=strict runner.js

      - name: Generate championship results for SRS DR2
        if: always()
        run: CLUB=srs-dr2 node --unhandled-rejections=strict runner.js

      - name: Upload logs as artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            hidden/out/
            hidden/cache/
          retention-days: 7
